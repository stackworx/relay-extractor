query UserQuery($id: ID!) {
  user(id: $id) {
    id
    name
    ...UserFragment @defer(label: "UserFrag")
    friends(first: 10) @stream(initial_count: 2, label: "Friends") {
      edges {
        node {
          id
          name
        }
      }
    }
  }
}

